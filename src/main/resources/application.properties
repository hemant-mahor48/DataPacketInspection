spring.application.name=DataPacketInspection
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
server.error.include-message=always
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/datapacketinspection;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.agent.token=${AGENT_TOKEN:browser-agent-demo-token}
app.security.admin-username=${APP_ADMIN_USERNAME:admin}
app.security.admin-password=${APP_ADMIN_PASSWORD:admin123}
app.security.analyst-username=${APP_ANALYST_USERNAME:analyst}
app.security.analyst-password=${APP_ANALYST_PASSWORD:analyst123}
